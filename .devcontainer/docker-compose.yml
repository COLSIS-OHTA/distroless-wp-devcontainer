services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      provenance: false
      sbom: false
      args:
        PNPM_VERSION: 10.12.1
    image: distroless-wp-dev:node24-pnpm
    container_name: "${COMPOSE_PROJECT_NAME:-distroless-wp}-dev"
    init: true
    command: sleep infinity
    working_dir: /workspaces/distroless-wp
    volumes:
      - .:/workspaces/distroless-wp:cached
    environment:
      TZ: ${TIME_ZONE:-Asia/Tokyo}
      HOST_MACHINE_UNSECURE_HOST_PORT: ${HOST_MACHINE_UNSECURE_HOST_PORT:-8080}
      HOST_MACHINE_SECURE_HOST_PORT: ${HOST_MACHINE_SECURE_HOST_PORT:-8443}
      HOST_MACHINE_PMA_PORT: ${HOST_MACHINE_PMA_PORT:-9080}
      HOST_MACHINE_MAILPIT_PORT: ${HOST_MACHINE_MAILPIT_PORT:-19980}
    extra_hosts:
      - "host.docker.internal:host-gateway"
